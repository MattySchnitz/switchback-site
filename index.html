<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Switchback CPQ</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f17;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .logo {
      width: 140px;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 40px;
      margin: 0 0 10px 0;
    }

    p {
      opacity: 0.8;
      margin: 0;
      font-size: 18px;
    }

    .badge {
      margin-top: 20px;
      display: inline-block;
      padding: 8px 16px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      font-size: 13px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div>
    <img class="logo" src="switchback-logo.png" alt="Switchback CPQ Logo" />
    <h1>Switchback CPQ</h1>
    <p>Modern CPQ infrastructure for high-growth teams.</p>
    <div class="badge">Coming Soon</div>
  </div>
</body>
</html>
