<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Switchback CPQ</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0b0f17;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 40px;
    }

    .logo {
      width: 120px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .badge {
      display: inline-block;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      font-size: 14px;
      opacity: 0.9;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Optional logo (replace with your own later) -->
    <img class="logo" src="./switchback-logo.png" />

    <h1>Switchback CPQ</h1>

    <p>
      Modern SaaS pricing for the AI Age.
    </p>

    <div class="badge">Coming Soon</div>

    <div class="footer">
      © 2026 Switchback CPQ
    </div>

  </div>
</body>
</html>
